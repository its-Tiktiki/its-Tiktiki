<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 42px;
        font-weight: 600;
        fill: #9d91f0;
        text-anchor: middle;
        animation: float 3s ease-in-out infinite;
      }
      .shadow {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 42px;
        font-weight: 600;
        fill: #7c6ee0;
        text-anchor: middle;
        opacity: 0.18;
        animation: shadowanim 3s ease-in-out infinite;
      }
      .glow {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 42px;
        font-weight: 600;
        fill: none;
        stroke: #7c6ee0;
        stroke-width: 0.5;
        text-anchor: middle;
        opacity: 0.4;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-10px); }
      }
      @keyframes shadowanim {
        0%, 100% { transform: translateY(4px) scaleY(0.3); opacity: 0.18; }
        50%       { transform: translateY(14px) scaleY(0.15); opacity: 0.08; }
      }
    </style>
  </defs>
  <text class="shadow" x="300" y="95">Tiktiki</text>
  <text class="glow"   x="300" y="72">Tiktiki</text>
  <text class="name"   x="300" y="72">Tiktiki</text>
</svg>
